name: Build .pycapp

on:
  push:
    branches: [main]
    paths:
      - main.py
      - levels/**
      - manifest.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyComputer SDK
        run: pip install pycomputersdk

      - name: Build .pycapp
        run: pycomp build . -o dist

      - name: Copy to repo root
        run: cp dist/glyphformer.pycapp Glyphformer.pycapp

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: update Glyphformer.pycapp [skip ci]"
          file_pattern: Glyphformer.pycapp
          skip_dirty_check: false
